<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawsome | Member Login</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.364.0/dist/umd/lucide.min.js"></script>
    <style>
        .auth-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            gap: 1rem;
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>

<body class="auth-wrapper">
    <div class="auth-card">
        <!-- Theme & RTL Toggles at the top to prevent overlapping with logo -->
        <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin: -1rem -1rem 1.5rem 0;">
            <button id="theme-toggle" class="btn"
                style="background: var(--bg); color: inherit; width: 38px; height: 38px; border: 1px solid var(--border); padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 10px;"><i
                    data-lucide="moon" style="width: 18px;"></i></button>
            <button id="rtl-toggle" class="btn"
                style="background: var(--bg); color: inherit; width: 38px; height: 38px; border: 1px solid var(--border); padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 10px;"><i
                    data-lucide="languages" style="width: 18px;"></i></button>
        </div>

        <a href="index.html" class="logo-brand" style="justify-content: center; margin-bottom: 2rem;">
            <i data-lucide="dog"></i> Pawsome
        </a>
        <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="opacity: 0.6; margin-bottom: 2.5rem;">Access your training progress and videos.</p>

        <form action="dashboard.html">
            <input type="email" placeholder="Email Address" class="auth-input" required>
            <div style="position: relative; width: 100%;">
                <input type="password" placeholder="Password" class="auth-input" style="width: 100%;" required>
                <span class="password-toggle"
                    style="position: absolute; right: 1rem; top: 1rem; cursor: pointer; color: #64748b;"><i
                        data-lucide="eye"></i></span>
            </div>

            <div class="auth-actions">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; white-space: nowrap;">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" style="font-weight: 700; color: var(--primary); white-space: nowrap;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: 12px;">Sign In</button>
        </form>

        <div style="text-align: center; margin: 2rem 0; position: relative;">
            <span
                style="background: var(--card-bg); padding: 0 1rem; position: relative; z-index: 1; font-size: 0.85rem; opacity: 0.6;">Or
                continue with</span>
            <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--border);">
            </div>
        </div>

        <div class="social-auth">
            <button class="btn btn-secondary"
                style="background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.75rem;"><i
                    data-lucide="chrome" style="width: 20px;"></i> Google</button>
            <button class="btn btn-secondary"
                style="background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.75rem;"><i
                    data-lucide="apple" style="width: 20px;"></i> Apple</button>
        </div>

        <p style="margin-top: 3rem; font-size: 0.95rem; opacity: 0.7;">
            Don't have an account? <a href="signup.html"
                style="font-weight: 700; color: var(--primary); white-space: nowrap;">Login</a>
        </p>
    </div>

    <script src="scripts/main.js"></script>
</body>

</html>
